name: Dreamlog
options:
  bundleIdPrefix: com.shimondeitel.dreamlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Dreamlog:
    type: application
    platform: iOS
    sources:
      - path: Dreamlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dreamlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Dreamlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DreamlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DreamlogTests
      - path: Dreamlog.storekit
    dependencies:
      - target: Dreamlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dreamlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DreamlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DreamlogUITests
    dependencies:
      - target: Dreamlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dreamlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Dreamlog:
    build:
      targets:
        Dreamlog: all
        DreamlogTests: [test]
        DreamlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Dreamlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Dreamlog.storekit
      targets:
        - DreamlogTests
        - DreamlogUITests
    archive:
      config: Release
